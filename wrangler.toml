name = "sons-of-disparity"
main = "src/worker/index.ts"
compatibility_date = "2024-09-23"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "sons-of-disparity-db"
database_id = "66a29669-18eb-4d71-8561-e5070b12e333"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "sons-of-disparity-media"

[vars]
GA4_MEASUREMENT_ID = "REPLACE_WITH_GA4_MEASUREMENT_ID"
ENVIRONMENT = "production"
# Guards POST /api/admin/migrate (idempotent D1 schema+seed). Rotate at will.
MIGRATE_TOKEN = "067282825cfdcabc4b591d490251b632"
